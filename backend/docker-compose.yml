services:
  db:
    image: pgvector/pgvector:pg16
    container_name: companion_db
    environment:
      POSTGRES_DB:       companion
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U postgres -d companion']
      interval: 5s
      timeout:  5s
      retries:  10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: companion_redis
    ports:
      - '6379:6379'
    healthcheck:
      test:     ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout:  5s
      retries:  10
    restart: unless-stopped

volumes:
  pgdata:
    name: companion_pgdata
