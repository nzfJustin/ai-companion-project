version: '3.8'

# Ephemeral test environment — data is wiped on every `docker compose down`.
# Uses offset ports (5433 / 6380) so it can run alongside the dev stack.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: companion_db_test
    environment:
      POSTGRES_DB:       companion_test
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    # tmpfs = in-memory storage, fastest possible + auto-wiped
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U postgres -d companion_test']
      interval: 3s
      timeout:  3s
      retries:  15

  redis:
    image: redis:7-alpine
    container_name: companion_redis_test
    ports:
      - '6380:6379'
    healthcheck:
      test:     ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout:  3s
      retries:  10
