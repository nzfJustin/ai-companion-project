name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: lint → typecheck → test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB:       companion_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV:            test
      DATABASE_URL:        postgresql://postgres:postgres@localhost:5433/companion_test
      TEST_DATABASE_URL:   postgresql://postgres:postgres@localhost:5433/companion_test
      REDIS_URL:           redis://localhost:6380
      TEST_REDIS_URL:      redis://localhost:6380
      PORT:                3001
      # Secrets — configure these in GitHub → Settings → Secrets → Actions
      APP_SECRET:          ${{ secrets.APP_SECRET }}
      ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
      JWT_PRIVATE_KEY:     ${{ secrets.JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY:      ${{ secrets.JWT_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "${APP_SECRET}" ]]        && missing+=("APP_SECRET")
          [[ -z "${ANTHROPIC_API_KEY}" ]] && missing+=("ANTHROPIC_API_KEY")
          [[ -z "${JWT_PRIVATE_KEY}" ]]   && missing+=("JWT_PRIVATE_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required secrets: ${missing[*]}"
            echo "   Add them in: GitHub repo → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ All required secrets present"

      - name: Install dependencies
        run: npm ci

      # ── Step 1: Lint ────────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── Step 2: Type check ──────────────────────────────────────────────────
      - name: Type check
        run: npm run typecheck

      # ── Step 3: Unit tests (no DB/Redis required) ───────────────────────────
      - name: Unit tests
        run: npx jest --runInBand --testPathIgnorePatterns='integration'

      # ── Step 4: Migrate (enables pgvector + applies schema) ─────────────────
      - name: Run migrations
        run: npm run db:migrate

      # ── Step 5: Integration tests (real DB + Redis) ─────────────────────────
      - name: Integration tests
        run: npx jest --runInBand --testPathPattern='integration'
